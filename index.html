
<!DOCTYPE html>
<html>
<head>
<title>Kalkulator Tropical</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BOX */

.calculator{
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

/* DISPLAY */

#display{
    width:100%;
    height:60px;
    border:none;
    border-radius:12px;
    font-size:24px;
    text-align:right;
    padding-right:12px;
    margin-bottom:15px;
    background:rgba(255,255,255,0.9);
}

/* GRID */

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

/* BUTTON */

button{
    height:60px;
    font-size:20px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.08);
}

/* NUMBER */

.number{
    background:linear-gradient(45deg,#00c9ff,#92fe9d);
}

/* OPERATOR */

.operator{
    background:linear-gradient(45deg,#ff7e5f,#feb47b);
}

/* EQUAL */

.equal{
    background:linear-gradient(45deg,#6a11cb,#2575fc);
}

/* CLEAR */

.clear{
    background:linear-gradient(45deg,#ff4b2b,#ff416c);
}

/* BACKSPACE */

.back{
    background:linear-gradient(45deg,#f7971e,#ffd200);
}

</style>
</head>

<body>

<div class="calculator">

<input id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="back" onclick="backspace()">⌫</button>
<button class="operator" onclick="press('(')">(</button>
<button class="operator" onclick="press('/')">:</button>

<button class="number" onclick="press('7')">7</button>
<button class="number" onclick="press('8')">8</button>
<button class="number" onclick="press('9')">9</button>
<button class="operator" onclick="press('*')">x</button>

<button class="number" onclick="press('4')">4</button>
<button class="number" onclick="press('5')">5</button>
<button class="number" onclick="press('6')">6</button>
<button class="operator" onclick="press('-')">-</button>

<button class="number" onclick="press('1')">1</button>
<button class="number" onclick="press('2')">2</button>
<button class="number" onclick="press('3')">3</button>
<button class="operator" onclick="press('+')">+</button>

<button class="number" onclick="press('.')">.</button>
<button class="number" onclick="press('0')">0</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

function press(value){
    document.getElementById("display").value += value;
}

function calculate(){
    let display = document.getElementById("display");

    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function backspace(){
    let display = document.getElementById("display");
    display.value = display.value.slice(0,-1);
}

</script>

</body>
</html>
